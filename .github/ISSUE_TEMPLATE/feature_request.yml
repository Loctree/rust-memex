name: Feature Request
description: Suggest an improvement or new capability for rust-memex
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Description
      description: What would you like to see added or improved?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem would this solve for you?
    validations:
      required: true
